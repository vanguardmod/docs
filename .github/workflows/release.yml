name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # v0.5.3
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'  # v0.5.2.3 (hotfix scheme)
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version override (e.g. 0.5.3)'
        required: true
        type: string

permissions:
  contents: write   # needed to create the release

jobs:
  release:
    name: Build & publish manual release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved manual version: ${VERSION}"

      - name: Build PDF
        run: make pdf VERSION=${{ steps.ver.outputs.version }}

      - name: Build HTML
        run: make html VERSION=${{ steps.ver.outputs.version }}

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp build/vanguardmod-manual.pdf  dist/vanguardmod-manual-v${{ steps.ver.outputs.version }}.pdf
          cp build/vanguardmod-manual.html dist/vanguardmod-manual-v${{ steps.ver.outputs.version }}.html
          ls -la dist/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: VanguardMod Manual v${{ steps.ver.outputs.version }}
          tag_name: v${{ steps.ver.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            dist/vanguardmod-manual-v${{ steps.ver.outputs.version }}.pdf
            dist/vanguardmod-manual-v${{ steps.ver.outputs.version }}.html
